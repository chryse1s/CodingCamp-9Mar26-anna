<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Checkpoint - Productivity Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .validation-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      background: var(--bg-component);
      border: 2px solid var(--border-color);
      padding: 15px;
      border-radius: 8px;
      max-width: 350px;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 9999;
      font-family: monospace;
      font-size: 12px;
      box-shadow: 0 4px 12px var(--shadow-component);
    }
    .test-pass { color: #27ae60; font-weight: bold; }
    .test-fail { color: #e74c3c; font-weight: bold; }
    .test-info { color: var(--text-primary); }
    .validation-header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      color: var(--text-accent);
    }
    .test-summary {
      background: var(--bg-timer-display);
      padding: 10px;
      border-radius: 6px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="validation-panel" id="validation-panel">
    <div class="validation-header">🔍 Final Checkpoint Validation</div>
    <div id="validation-output">Initializing tests...</div>
  </div>

  <header>
    <h1>Productivity Dashboard</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <span class="theme-icon">🌙</span>
    </button>
  </header>
  
  <main>
    <section id="greeting-display" class="component">
      <div class="greeting-display">
        <div class="greeting-text">Good Morning</div>
        <div class="current-time">12:00 PM</div>
        <div class="current-date">Loading...</div>
      </div>
    </section>
    
    <section id="focus-timer" class="component">
      <div class="focus-timer">
        <div class="timer-display">25:00</div>
        <div class="duration-selector">
          <label for="duration-select">Duration:</label>
          <select id="duration-select" class="duration-select" aria-label="Select timer duration">
            <option value="25">25 minutes</option>
            <option value="30">30 minutes</option>
            <option value="45">45 minutes</option>
          </select>
        </div>
        <div class="timer-controls">
          <button class="btn-start">Start</button>
          <button class="btn-stop">Stop</button>
          <button class="btn-reset">Reset</button>
        </div>
      </div>
    </section>
  </main>
  
  <script src="js/app.js"></script>
  <script src="js/validate-integration.js"></script>
</body>
</html>
