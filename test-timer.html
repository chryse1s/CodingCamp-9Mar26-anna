<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer Test - Duration Customization</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .test-results {
      position: fixed;
      top: 10px;
      right: 10px;
      background: var(--bg-component);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px var(--shadow-component);
      max-width: 300px;
      z-index: 1000;
    }
    .test-item {
      margin: 8px 0;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .test-pass {
      background: #d4edda;
      color: #155724;
    }
    .test-fail {
      background: #f8d7da;
      color: #721c24;
    }
    .test-info {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
  <header>
    <h1>Timer Duration Test</h1>
  </header>
  
  <main>
    <section id="focus-timer" class="component">
      <!-- Will be populated by FocusTimer -->
    </section>
  </main>

  <div class="test-results">
    <h3>Timer Test Results</h3>
    <div id="test-output"></div>
    <button onclick="runTimerTests()" style="margin-top: 10px;">Run Timer Tests</button>
  </div>
  
  <script src="js/app.js"></script>
  <script>
    // Test suite for timer functionality
    function runTimerTests() {
      const output = document.getElementById('test-output');
      output.innerHTML = '';
      
      const tests = [];
      
      // Test 1: Timer duration persistence
      try {
        LocalStorageService.setTimerDuration(30);
        const retrieved = LocalStorageService.getTimerDuration();
        tests.push({
          name: 'Timer duration persistence',
          pass: retrieved === 30,
          message: `Stored: 30, Retrieved: ${retrieved}`
        });
      } catch (e) {
        tests.push({
          name: 'Timer duration persistence',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 2: Timer duration validation
      try {
        LocalStorageService.setTimerDuration(60); // Invalid duration
        const retrieved = LocalStorageService.getTimerDuration();
        tests.push({
          name: 'Timer duration validation',
          pass: retrieved === 30, // Should still be the previous valid value
          message: `Invalid 60 rejected, current: ${retrieved}`
        });
      } catch (e) {
        tests.push({
          name: 'Timer duration validation',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 3: FocusTimer initialization with saved duration
      try {
        const container = document.getElementById('focus-timer');
        const timer = new FocusTimer(container);
        timer.init();
        
        const duration = timer.getDuration();
        tests.push({
          name: 'FocusTimer initialization',
          pass: duration === 30,
          message: `Timer initialized with duration: ${duration} minutes`
        });
      } catch (e) {
        tests.push({
          name: 'FocusTimer initialization',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 4: Duration selector UI exists
      try {
        const durationSelect = document.querySelector('.duration-select');
        const hasOptions = durationSelect && durationSelect.querySelectorAll('option').length === 3;
        tests.push({
          name: 'Duration selector UI',
          pass: hasOptions,
          message: hasOptions ? 'Dropdown with 3 options found' : 'Dropdown not found or missing options'
        });
      } catch (e) {
        tests.push({
          name: 'Duration selector UI',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 5: setDuration method functionality
      try {
        const container = document.getElementById('focus-timer');
        const timer = new FocusTimer(container);
        timer.init();
        
        timer.setDuration(45);
        const newDuration = timer.getDuration();
        const storedDuration = LocalStorageService.getTimerDuration();
        
        tests.push({
          name: 'setDuration method',
          pass: newDuration === 45 && storedDuration === 45,
          message: `Timer duration: ${newDuration}, Stored: ${storedDuration}`
        });
      } catch (e) {
        tests.push({
          name: 'setDuration method',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 6: Reset uses selected duration
      try {
        const container = document.getElementById('focus-timer');
        const timer = new FocusTimer(container);
        timer.init();
        
        timer.setDuration(25);
        timer.reset();
        
        // Check if timer display shows 25:00
        const display = container.querySelector('.timer-display');
        const displayText = display ? display.textContent : '';
        
        tests.push({
          name: 'Reset uses selected duration',
          pass: displayText === '25:00',
          message: `Display shows: ${displayText}`
        });
      } catch (e) {
        tests.push({
          name: 'Reset uses selected duration',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 7: Accessibility - ARIA labels
      try {
        const durationSelect = document.querySelector('.duration-select');
        const hasAriaLabel = durationSelect && durationSelect.hasAttribute('aria-label');
        tests.push({
          name: 'Accessibility - ARIA labels',
          pass: hasAriaLabel,
          message: hasAriaLabel ? 'Duration selector has ARIA label' : 'Missing ARIA label'
        });
      } catch (e) {
        tests.push({
          name: 'Accessibility - ARIA labels',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Display results
      const passCount = tests.filter(t => t.pass).length;
      const totalCount = tests.length;
      
      output.innerHTML = `
        <div class="test-item test-info">
          <strong>Results: ${passCount}/${totalCount} tests passed</strong>
        </div>
        ${tests.map(test => `
          <div class="test-item ${test.pass ? 'test-pass' : 'test-fail'}">
            <strong>${test.name}:</strong><br>
            ${test.message}
          </div>
        `).join('')}
      `;
      
      // Overall status
      if (passCount === totalCount) {
        output.innerHTML += '<div class="test-item test-pass"><strong>✅ All timer tests passed!</strong></div>';
      } else {
        output.innerHTML += '<div class="test-item test-fail"><strong>❌ Some timer tests failed</strong></div>';
      }
    }
    
    // Auto-run tests when page loads
    window.addEventListener('load', () => {
      setTimeout(runTimerTests, 1000); // Give components time to initialize
    });
  </script>
</body>
</html>
