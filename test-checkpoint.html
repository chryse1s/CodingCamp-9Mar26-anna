<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint Test - Theme and Greeting Features</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .test-results {
      position: fixed;
      top: 10px;
      right: 10px;
      background: var(--bg-component);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px var(--shadow-component);
      max-width: 300px;
      z-index: 1000;
    }
    .test-item {
      margin: 8px 0;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .test-pass {
      background: #d4edda;
      color: #155724;
    }
    .test-fail {
      background: #f8d7da;
      color: #721c24;
    }
    .test-info {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
  <header>
    <h1>Checkpoint Test</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <span class="theme-icon">🌙</span>
    </button>
  </header>
  
  <main>
    <section id="greeting-display" class="component">
      <!-- Will be populated by GreetingDisplay -->
    </section>
    
    <section id="focus-timer" class="component">
      <!-- Will be populated by FocusTimer -->
    </section>
  </main>

  <div class="test-results">
    <h3>Test Results</h3>
    <div id="test-output"></div>
    <button onclick="runTests()" style="margin-top: 10px;">Run Tests</button>
  </div>
  
  <script src="js/app.js"></script>
  <script>
    // Test suite for checkpoint verification
    function runTests() {
      const output = document.getElementById('test-output');
      output.innerHTML = '';
      
      const tests = [];
      
      // Test 1: Theme Manager exists and initializes
      try {
        const themeManager = new ThemeManager();
        const currentTheme = themeManager.getCurrentTheme();
        tests.push({
          name: 'ThemeManager initialization',
          pass: currentTheme === 'light' || currentTheme === 'dark',
          message: `Current theme: ${currentTheme}`
        });
      } catch (e) {
        tests.push({
          name: 'ThemeManager initialization',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 2: Theme toggle functionality
      try {
        const themeManager = new ThemeManager();
        const initialTheme = themeManager.getCurrentTheme();
        themeManager.toggleTheme();
        const newTheme = themeManager.getCurrentTheme();
        tests.push({
          name: 'Theme toggle',
          pass: initialTheme !== newTheme,
          message: `${initialTheme} → ${newTheme}`
        });
      } catch (e) {
        tests.push({
          name: 'Theme toggle',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 3: LocalStorage theme persistence
      try {
        LocalStorageService.setThemePreference('dark');
        const retrieved = LocalStorageService.getThemePreference();
        tests.push({
          name: 'Theme persistence',
          pass: retrieved === 'dark',
          message: `Stored: dark, Retrieved: ${retrieved}`
        });
      } catch (e) {
        tests.push({
          name: 'Theme persistence',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 4: User name functionality
      try {
        LocalStorageService.setUserName('Test User');
        const retrieved = LocalStorageService.getUserName();
        tests.push({
          name: 'User name persistence',
          pass: retrieved === 'Test User',
          message: `Stored: Test User, Retrieved: ${retrieved}`
        });
      } catch (e) {
        tests.push({
          name: 'User name persistence',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 5: Name validation
      try {
        LocalStorageService.setUserName('');
        LocalStorageService.setUserName('   ');
        const retrieved = LocalStorageService.getUserName();
        tests.push({
          name: 'Name validation',
          pass: retrieved === 'Test User', // Should still be the previous valid name
          message: `Empty names rejected, current: ${retrieved}`
        });
      } catch (e) {
        tests.push({
          name: 'Name validation',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 6: CSS theme classes
      try {
        const themeManager = new ThemeManager();
        themeManager.setTheme('dark');
        const hasDarkClass = document.body.classList.contains('theme-dark');
        themeManager.setTheme('light');
        const hasLightClass = document.body.classList.contains('theme-light');
        tests.push({
          name: 'CSS theme classes',
          pass: hasDarkClass && hasLightClass,
          message: `Dark class applied: ${hasDarkClass}, Light class applied: ${hasLightClass}`
        });
      } catch (e) {
        tests.push({
          name: 'CSS theme classes',
          pass: false,
          message: `Error: ${e.message}`
        });
      }
      
      // Test 7: Theme toggle button exists
      const themeToggle = document.getElementById('theme-toggle');
      tests.push({
        name: 'Theme toggle button',
        pass: themeToggle !== null,
        message: themeToggle ? 'Button found' : 'Button not found'
      });
      
      // Test 8: Greeting display component
      const greetingContainer = document.getElementById('greeting-display');
      tests.push({
        name: 'Greeting display container',
        pass: greetingContainer !== null,
        message: greetingContainer ? 'Container found' : 'Container not found'
      });
      
      // Display results
      const passCount = tests.filter(t => t.pass).length;
      const totalCount = tests.length;
      
      output.innerHTML = `
        <div class="test-item test-info">
          <strong>Results: ${passCount}/${totalCount} tests passed</strong>
        </div>
        ${tests.map(test => `
          <div class="test-item ${test.pass ? 'test-pass' : 'test-fail'}">
            <strong>${test.name}:</strong><br>
            ${test.message}
          </div>
        `).join('')}
      `;
      
      // Overall status
      if (passCount === totalCount) {
        output.innerHTML += '<div class="test-item test-pass"><strong>✅ All tests passed!</strong></div>';
      } else {
        output.innerHTML += '<div class="test-item test-fail"><strong>❌ Some tests failed</strong></div>';
      }
    }
    
    // Auto-run tests when page loads
    window.addEventListener('load', () => {
      setTimeout(runTests, 1000); // Give components time to initialize
    });
  </script>
</body>
</html>
