<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Productivity Dashboard</h1>
  </header>
  
  <main>
    <section id="greeting-display" class="component">
      <div class="greeting-display">
        <div class="greeting-text">Good Morning</div>
        <div class="current-time">12:00 PM</div>
        <div class="current-date">Loading...</div>
      </div>
    </section>
    
    <section id="focus-timer" class="component">
      <div class="focus-timer">
        <div class="timer-display">25:00</div>
        <div class="timer-controls">
          <button class="btn-start">Start</button>
          <button class="btn-stop">Stop</button>
          <button class="btn-reset">Reset</button>
        </div>
      </div>
    </section>
    
    <section id="task-list" class="component">
      <div class="task-list">
        <div class="task-input-container">
          <input type="text" class="task-input" placeholder="Add a new task...">
          <button class="btn-add-task">Add</button>
        </div>
        <ul class="tasks">
          <!-- Tasks will be dynamically added here -->
        </ul>
      </div>
    </section>
    
    <section id="quick-links-manager" class="component">
      <div class="quick-links-manager">
        <div class="link-input-container">
          <input type="text" class="link-name-input" placeholder="Link name">
          <input type="url" class="link-url-input" placeholder="https://example.com">
          <button class="btn-add-link">Add Link</button>
        </div>
        <div class="links">
          <!-- Links will be dynamically added here -->
        </div>
      </div>
    </section>
  </main>
  
  <script src="js/app.js"></script>
</body>
</html>
